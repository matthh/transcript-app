name: Warmup

on:
  schedule:
    # Every 5 minutes, 8am–midnight Pacific (UTC-7: 15:00–07:00 UTC)
    - cron: "*/5 15-23 * * *"
    - cron: "*/5 0-6 * * *"

jobs:
  warmup:
    runs-on: ubuntu-latest
    steps:
      - name: Warm search cache
        env:
          WARMUP_URL: ${{ secrets.WARMUP_URL }}
          WARMUP_TOKEN: ${{ secrets.WARMUP_TOKEN }}
        run: |
          if [ -z "$WARMUP_URL" ]; then
            echo "WARMUP_URL secret is missing" >&2
            exit 1
          fi
          if [ -n "$WARMUP_TOKEN" ]; then
            URL="$WARMUP_URL?token=$WARMUP_TOKEN"
          else
            URL="$WARMUP_URL"
          fi
          # Send 3 concurrent requests to warm multiple Vercel instances
          curl -fsS "$URL" &
          curl -fsS "$URL" &
          curl -fsS "$URL" &
          wait
