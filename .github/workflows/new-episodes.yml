name: Check New Episodes

on:
  schedule:
    - cron: "0 14 * * *" # Daily at 2 PM UTC (9 AM ET)
  workflow_dispatch:
    inputs:
      include_backfill:
        description: "Include historical backfill episodes (not just recent/new)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # Transcription polling can take 60min

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check for new episodes
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY_JSON }}
          ASSEMBLYAI_API_KEY: ${{ secrets.ASSEMBLYAI_API_KEY }}
          BLOB_READ_WRITE_TOKEN: ${{ secrets.BLOB_READ_WRITE_TOKEN }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          INCLUDE_BACKFILL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.include_backfill || 'false' }}
        run: |
          if [ "$INCLUDE_BACKFILL" = "true" ]; then
            node --import tsx ./scripts/check-new-episodes.ts --verbose --include-backfill
          else
            node --import tsx ./scripts/check-new-episodes.ts --verbose
          fi

      # The script runs sync-metadata internally, which updates metadata-data.ts
      # on disk but doesn't commit it. Commit here so the deploy includes the
      # latest metadata (guests, episode info, etc.) — prevents the gap where a
      # transcript exists in Blob but metadata is missing from the deployed build.
      - name: Commit metadata and transcript changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/metadata-data.ts
          git add transcripts/episode_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync metadata and transcripts"
            git push origin HEAD:master
            echo "CHANGES_COMMITTED=true" >> "$GITHUB_ENV"
          fi

      # If metadata was committed, trigger one more deploy so the build uses the
      # commit that has both the transcript AND the metadata.  The script may have
      # already triggered a deploy (with stale metadata) — this ensures correctness.
      - name: Trigger deploy with updated metadata
        if: env.CHANGES_COMMITTED == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$VERCEL_DEPLOY_HOOK_URL" ]; then
            curl -sf -X POST "$VERCEL_DEPLOY_HOOK_URL" || echo "Deploy hook trigger failed (non-fatal)"
            echo "Triggered Vercel deploy with updated metadata."
          fi
