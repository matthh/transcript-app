name: Enrich TMDB

on:
  schedule:
    - cron: "0 15 * * 1" # Mondays at 3 PM UTC (10 AM ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Enrich metadata with TMDB
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          if [ -z "$TMDB_API_KEY" ]; then
            echo "TMDB_API_KEY secret is required."
            exit 1
          fi
          npm run enrich-tmdb

      - name: Commit and push enriched metadata
        run: |
          if git diff --quiet -- src/lib/metadata-data.ts; then
            echo "No TMDB enrichment changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/metadata-data.ts
          git commit -m "chore(metadata): enrich tmdb fields"
          git push origin HEAD:master
